name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Strip server-only bits (Pages is static-only)
        # API routes en middleware draaien niet op een statische host.
        # De publieke site werkt in demo-modus zonder backend.
        run: |
          rm -rf app/api
          rm -f middleware.ts

      - name: Build static export
        env:
          PAGES: "true"
          PAGES_BASE_PATH: "/skylens"
          NEXT_PUBLIC_SITE_URL: "https://frank2889.github.io/skylens"
        run: npm run build

      - name: Prepare artifact
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
